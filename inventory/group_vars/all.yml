---
sudoers:
  - wheel
  - evgenii

users:
  - {
      user: "evgenii",
      groups: "wheel",
      state: "present",
      uid: 1349,
      comment: "evgenii",
      skel: "yes",
      shell: "/bin/bash"
    }

timezone: "Europe/Moscow"

config_system_locale: "en_US.UTF-8"
config_system_language: "en_US.UTF-8"

packages:
  - vim
  - git

deb_architectures:
  {
    "armv6l": "armhf",
    "armv7l": "armhf",
    "aarch64": "arm64",
    "x86_64": "amd64",
    "i386": "i386",
  }
