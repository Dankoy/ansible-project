- name: Append logs
  ansible.builtin.shell: echo "{{ inventory_hostname }} ~ {{ ansible_fqdn }}; OUT= {{ mysql_installed.stdout }}; ERR= {{ mysql_installed.stderr }}" >>
    /home/ezelenin/Documents/mysql-check/ansib.log
  delegate_to: localhost
  tags: mysql-check

