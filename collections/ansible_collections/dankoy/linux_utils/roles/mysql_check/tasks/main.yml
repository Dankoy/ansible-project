---
- name: Check mysql version
  ansible.builtin.shell: echo "SHOW VARIABLES LIKE 'version_comment';" | mysql | awk -F " " '{print $2}' | grep -vi Value
  register: mysql_installed
  ignore_errors: true
  tags: mysql-check

