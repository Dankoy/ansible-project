---

- name: Update apt-get repo and cache
  become: true
  ansible.builtin.apt: update_cache=yes cache_valid_time=3600
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  tags: update

- name: Upgrade all
  become: true
  ansible.builtin.apt:
    name: "*"
    state: latest
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  tags: update

- name: Check if reboot is necessary
  become: true
  register: reboot_required_file
  ansible.builtin.stat: path=/var/run/reboot-required
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  tags: update

- name: Reboot
  become: true
  reboot:
    msg: "Reboot initiated by Ansible"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  when: reboot_required_file.stat.exists and ( ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu' )
  tags: update
