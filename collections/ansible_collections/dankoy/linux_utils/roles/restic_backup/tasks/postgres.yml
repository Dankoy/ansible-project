- name: Copy restic backup script for postgres
  ansible.builtin.template:
    src: restic-backup-postgres.sh.j2
    dest: "{{ backup_script_pwd }}/restic-backup.sh"
    owner: root
    group: root
    mode: 0755
  tags: restic-backup

- name: Write backing up politics for roles
  blockinfile:
    path: "{{ backup_script_pwd }}/restic-backup.sh"
    insertafter: "#ROLES"
    marker: "### {mark} ANSIBLE MANAGED ROLES ###"
    block: "{{ backup_roles }}"
    backup: yes
  when: ("one_by_one" in restic_extra_vars)
  tags: restic-backup
  
- name: Write backing up politics for one by one dbs
  blockinfile:
    path: "{{ backup_script_pwd }}/restic-backup.sh"
    insertafter: "#ONE_BY_ONE_DATABASES"
    marker: "### {mark} ANSIBLE MANAGED ONE BY ONE DATABASES ###"
    block: "{{ backup_one_db }}"
    backup: yes
  when: ("one_by_one" in restic_extra_vars)
  tags: restic-backup

- name: Write backing up politics for all in one db
  blockinfile:
    path: "{{ backup_script_pwd }}/restic-backup.sh"
    insertafter: "#ALL_DATABASES"
    marker: "### {mark} ANSIBLE MANAGED ALL DATABASES ###"
    block: "{{ backup_all }}"
    backup: yes
  when: ("all_db" in restic_extra_vars)
  tags: restic-backup  
