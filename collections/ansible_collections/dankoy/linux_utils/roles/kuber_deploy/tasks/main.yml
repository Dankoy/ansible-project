# Check number of nodes to play
- name: Check if cluster consist of at least 3 nodes
  fail: msg="Cluster must have at least 3 members"
  when: play_hosts|count() < 3
  run_once: true
  tags: kuber-deploy 
  
- name: Install all packages for CentOS-7
  ansible.builtin.dnf:
    name: ['net-tools', 'wget', 'telnet', 'yum-utils', 'device-mapper-persistent-data', 'lvm2', 'iptables-services']
    state: present
#  delegate_to: "{{item}}"
#  delegate_facts: True
#  loop: "{{groups['cluster-test-master']}}"
#  when: group_names | select('search','master') | list | count > 0
  tags: kuber-deploy

- name: Disable SWAP since kubernetes can't work with swap enabled (1/2)
  shell: |
    swapoff -a
  tags: kuber-deploy
  
- name: disable swap
  replace:
    path: "/etc/fstab"
    regexp: '^(.+?swap+.*)$'
    replace: '#\1'
  tags: kuber-deploy
  
# Add nodes in /etc/hosts
- name: Add hosts to /etc/hosts
  ansible.builtin.lineinfile:
  args:
    dest: "/etc/hosts"
    regexp: "{{ hostvars[item]['ansible_default_ipv4']['address'] }}"
    line: "{{ hostvars[item]['ansible_default_ipv4']['address'] }} {{ hostvars[item]['ansible_fqdn'] }}   {{ hostvars[item]['ansible_fqdn'].split('.')[0] }}"
  with_items: "{{ ansible_play_batch }}"
  tags: kuber-deploy

- name: check if NetworkManager is used
  service_facts:
  tags: kuber-deploy  
  
# Disable firewalld
- name: stop and disable and mask firewalld
  systemd:
    name: firewalld
    state: stopped
    enabled: no
    masked: yes
  when: ansible_facts.services["firewalld.service"].state == "running"
  tags: kuber-deploy
  
# start and enable iptables-services
- name: start and enable iptables-services
  systemd:
    name: iptables
    state: started
    enabled: yes
    masked: no
  tags: kuber-deploy  
  
- name: Add br_netfilter module
  modprobe:
    name: br_netfilter
    state: present
  tags: kuber-deploy
  
- name: Add things in sysctl
  ansible.builtin.lineinfile:
  args:
    dest: "/etc/sysctl.conf"
    regexp: "^net.bridge.bridge-nf-call-iptables"
    line: "net.bridge.bridge-nf-call-iptables = 1"
  notify: sysctl reload
  tags: kuber-deploy  
    
- name: check if cluster already exists on master
  command: kubeadm config view
  register: kubeadm_config
#  when: "'master' in inventory_hostname"
  when: group_names | select('search','master') | list | count > 0
  tags: kuber-deploy

- set_fact:
    kuber_config: "{{ kubeadm_config }}"
#  when: "'master' in inventory_hostname"
  when: group_names | select('search','master') | list | count > 0
  tags: kuber-deploy
  
- ansible.builtin.include_tasks: "iptables.yml"
  tags: kuber-deploy

- ansible.builtin.include_tasks: "docker.yml"
  tags: kuber-deploy
  
- ansible.builtin.include_tasks: "kuber-install.yml"
  tags: kuber-deploy
  
- ansible.builtin.include_tasks: "kuber-config-flannel.yml"
#  when: ("flannel" in cni)  and (hostvars[groups['cluster-test-master'][0]]['kuber_config'].failed) and ("'master' in inventory_hostname")
  when: ("flannel" in cni)  and (group_names | select('search','master') | list | count > 0) and (kubeadm_config.failed)
  ignore_errors: True
  tags: kuber-deploy
  
- ansible.builtin.include_tasks: "kuber-config-calico.yml"
#  when: ("calico" in cni)  and (hostvars[groups['cluster-test-master'][0]]['kuber_config'].failed) and ("'master' in inventory_hostname")
  when: ("calico" in cni)  and (group_names | select('search','master') | list | count > 0) and (kubeadm_config.failed)
  ignore_errors: True
  tags: kuber-deploy     
  
- ansible.builtin.include_tasks: "kuber-worker.yml"
  when:  hostvars[groups['cluster-test-master'][0]]['kuber_config'].failed
  tags: kuber-deploy
  
  
  

  
 
  
  
  
