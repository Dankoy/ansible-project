---
- name: Check if docker-repo exists
  ansible.builtin.stat:
    path: /etc/yum.repos.d/docker-ce.repo
  register: st
  tags: kuber-deploy

- name: Yum add repo docker
  ansible.builtin.command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  when: not st.stat.exists
  tags: kuber-deploy

- name: Install docker for CentOS-7
  ansible.builtin.dnf:
    name: ["docker-ce-18.06.2.ce"]
    state: present
  tags: kuber-deploy

- name: Create a directory if it does not exist /etc/docker
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"
  tags: kuber-deploy

- name: Copy daemon.json in /etc/docker
  ansible.builtin.copy:
    src: daemon.json
    dest: /etc/docker
    owner: root
    group: root
    mode: "0644"
    backup: true
  tags: kuber-deploy

- name: Create a directory if it does not exist /etc/systemd/system/docker.service.d
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"
  register: service
  tags: kuber-deploy

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: service.changed
  tags: kuber-deploy

# start and enable docker
- name: Start and enable docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  tags: kuber-deploy
