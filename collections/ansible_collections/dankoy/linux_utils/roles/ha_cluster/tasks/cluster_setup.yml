---
- name: Block check cluster
  become: true
  tags:
    - ha_cluster
    - cluster_setup
  block:
    # Check cluster status. If cluster is working then no manipulations with cluster are allowed
    - name: Include cluster status and print item
      ansible.builtin.include_tasks: "cluster_status.yml"

    - name: Stop if cluster working
      ansible.builtin.fail:
        msg: Cluster is working. Abort play.
      when: (ha_cluster_cluster_status_registered.stdout.find("Online") and (ha_cluster_cluster_status_registered is not failed))

- name: Block for cluster configuration
  become: true
  tags:
    - ha_cluster
    - cluster_setup
  block:
    # Generate password locally
    - name: Generate password localy
      ansible.builtin.command: pwgen 24 1 -B
      delegate_to: localhost
      register: ha_cluster_password
      run_once: true
      become: false
      changed_when: false

    # Create user hacluster
    - name: Create cluster system user
      ansible.builtin.user:
        name: "{{ cluster_user }}"
        comment: "cluster user"
        shell: /sbin/nologin
        state: present
        password: "{{ ha_cluster_password.stdout | password_hash('sha512', ansible_facts['hostname']) }}"

    # Authorize nodes
    - name: Authorize cluster nodes
      # ansible.builtin.command: "pcs host auth {{ hostvars[item]['ansible_fqdn'].split('.')[0] }} -u {{ cluster_user }} -p {{ ha_clister_password.stdout }}"
      ondrejhome.ha_cluster.pcs_auth:
        node_name: "{{ hostvars[item]['ansible_fqdn'].split('.')[0] }}"
        username: "{{ cluster_user }}"
        password: "{{ ha_cluster_password.stdout }}"
        state: "present"
      with_items: "{{ ansible_play_batch }}"

- name: Block cluster setup
  become: true
  run_once: true
  tags:
    - ha_cluster
    - cluster_setup
  block:
    # Setup cluster
    - name: Setup cluster
      ondrejhome.ha_cluster.pcs_cluster:
        node_list: "{% for item in ansible_play_batch %}{{ hostvars[item]['ansible_hostname'] }} {% endfor %}"
        cluster_name: "{{ cluster_name }}"
        transport: "{{ cluster_transport }}"
        state: present
      with_items: "{{ ansible_play_batch }}"

    # Start cluster on all nodes
    - name: Start cluster on all nodes
      ansible.builtin.command: pcs cluster start --all
      changed_when: false

    - name: Wait for 5 seconds
      ansible.builtin.pause:
        seconds: 5

- name: Check status
  ansible.builtin.include_tasks: "cluster_status.yml"
  tags:
    - ha_cluster
    - cluster_setup

- name: Block | enable pacemaker and corosync
  become: true
  tags:
    - ha_cluster
    - cluster_setup
  block:
    # Enable pacemaker and corosync for CentOS-7 or OEL-7
    - name: Enable cluster services on all nodes for RHEL,OEL - 7,8,9
      become: true
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: true
      with_items:
        - pacemaker
        - corosync
      when: ((ansible_facts['distribution'] == "CentOS" and ansible_facts['distribution_major_version'] == "7") or (ansible_facts['distribution'] == "OracleLinux"
        and ansible_facts['distribution_major_version'] == "7") or (ansible_facts['distribution'] == "CentOS" and ansible_facts['distribution_major_version'] ==
        "8") or (ansible_facts['distribution'] == "CentOS" and ansible_facts['distribution_major_version'] == "9"))

    # Enable only pacemaker for CentOS-6 or OEL-6
    - name: Enable cluster services on all nodes for RHEL,OEL - 6
      become: true
      ansible.builtin.service:
        name: pacemaker
        state: started
        enabled: true
      when: ((ansible_facts['distribution'] == "CentOS" and ansible_facts['distribution_major_version'] == "6") or (ansible_facts['distribution'] == "OracleLinux"
        and ansible_facts['distribution_major_version'] == "6"))

- name: Block set properties
  become: true
  run_once: true
  when: (ha_cluster_cluster_status_registered.stdout.find("Online") and (ha_cluster_cluster_status_registered is not failed))
  tags:
    - ha_cluster
    - cluster_setup
  block:
    # Only for two nodes cluster.
    # Disable property stonith-enabled
    # ondrejhome.ha_cluster.pcs_property doesn't work with community.general version 13
    - name: Stonith disable
      ansible.builtin.command: "pcs property set stonith-enabled=false"
      when: ansible_play_batch|count() == 2

    # Only for two nodes cluster.
    # Ignore quorum
    - name: Quorum ignore
      ansible.builtin.command: "pcs property set stonith-enabled=false"
      when: ansible_play_batch|count() == 2
