#  ansible.builtin.ansible.builtin.apt_repository:
#    repo: deb [arch=amd64] https://download.docker.com/{{ ansible_system | lower }}/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable
#    repo: [arch={{ [ansible_architecture] | map('extract', deb_architecture) | first }}] https://download.docker.com/{{ ansible_system | lower }}/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable
#    state: present
#    filename: docker
#  tags: docker

- name: Add repository into sources list
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ [ansible_architecture] | map('extract', deb_architectures) | first }}] https://download.docker.com/{{ ansible_system | lower }}/{{ ansible_distribution
      | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  tags: docker

- name: Install Docker
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
  notify: restart docker
  tags: docker

- name: Setup docker user
  become: true
  ansible.builtin.user:
    name: { { item.user: !!null "" }: !!null "" }
    append: true
    groups: docker
    uid: { { item.uid: !!null "" }: !!null "" }
    state: { { item.state: !!null "" }: !!null "" }
    comment: { { item.comment: !!null "" }: !!null "" }
    shell: { { item.shell: !!null "" }: !!null "" }
  with_items: "{{ users }}"
  when: item.state == "present"
  ignore_errors: true
  tags: docker

