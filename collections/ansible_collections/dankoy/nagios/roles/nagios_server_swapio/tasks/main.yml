---

- name: Copy nagios host cfg
  ansible.builtin.template:
    src: swapio.j2
    dest: "{{ nagios_cfg_dest }}/{{ client_name }}/{{ inventory_hostname }}-swapio.cfg"
    owner: root
    mode: "0644"
  delegate_to: "{{ nagios_ost2_ip }}"
  tags:
    - nagios
    - nagios_swapio
    - nagios_server_swapio
