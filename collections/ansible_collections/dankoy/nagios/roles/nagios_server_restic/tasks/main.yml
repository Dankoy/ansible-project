---
- name: Copy nagios host cfg
  ansible.builtin.template:
    src: restic.j2
    dest: "{{ nagios_cfg_dest }}/{{ client_name }}/{{ inventory_hostname }}-restic.cfg"
    owner: root
    mode: "0644"
  delegate_to: "{{ nagios_ost2_ip }}"
  tags:
    - nagios
    - nagios_restic
    - nagios_server_restic
