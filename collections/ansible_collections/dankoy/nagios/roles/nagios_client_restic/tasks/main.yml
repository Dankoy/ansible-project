---

- name: Copy plugin to client machine
  ansible.builtin.copy:
    src: restic-check.sh
    dest: /usr/lib64/nagios/plugins/check_restic.sh
    owner: root
    mode: "0755"
  tags:
    - nagios
    - nagios-restic
    - nagios-client-restic

- name: Copy nrpe command for restic
  ansible.builtin.template:
    src: check-restic.j2
    dest: "/etc/nrpe.d/check_restic.cfg"
    owner: root
    group: root
    mode: "0644"
  notify: Restart nrpe
  tags:
    - nagios
    - nagios_restic
    - nagios_client_restic

- name: Check if sudoers.d nrpe exists
  ansible.builtin.stat:
    path: /etc/sudoers.d/nrpe
  register: nagios_client_restic_st
  tags:
    - nagios
    - nagios_restic
    - nagios_client_restic

- name: Copy nrpe file if not exists
  ansible.builtin.copy:
    src: nrpe
    dest: /etc/sudoers.d/nrpe
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  when: not nagios_client_restic_st.stat.exists
  tags:
    - nagios
    - nagios_restic
    - nagios_client_restic

- name: Write sudo rule and validate the sudoers file before saving
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/nrpe
    state: present
    line: 'nrpe ALL=NOPASSWD: /usr/lib64/nagios/plugins/check_restic.sh *'
    validate: /usr/sbin/visudo -cf %s
  when: st.stat.exists
  tags:
    - nagios
    - nagios_restic
    - nagios_client_restic
